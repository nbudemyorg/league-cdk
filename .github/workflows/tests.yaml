on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      MYPYPATH: ./layers/tables/python
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]'

      - name: Ruff Linter
        run: ruff check --diff .

      - name: Ruff Formatter
        run: ruff format --diff .

      - name: Run MyPy Type Checker
        run: mypy ./src

      - name: Run PyTest
        run: pytest
