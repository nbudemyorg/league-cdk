{% include 'header.html' %}

{% if error == 'server' %}
<div class="alert alert-danger" role="alert">
  Server Error
</div>
{% elif error == 'submitted' %}
<div class="alert alert-success" role="alert">
  Request submitted, please check your email
</div>
{%elif alert == 'password' %}
<div class="alert alert-warning" role="alert">
  Supplied password does not conform to required standard
</div>
{% endif %}

  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-sm login-card">
      <div class="card-body p-4">
        <h4 class="card-title mb-3 text-center">Password Reset Request</h4>
        <form action="/prod/reset/{{ params.reset_id }}" method="post">
          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input id="new_password" name="new_password" type="password" class="form-control" placeholder="Enter New Password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

{% include 'footer.html' %}
